name: Smoke Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  relay-smoke:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke test
        env:
          REDIS_URL: redis://127.0.0.1:6379/15
          CODEX_PORT: "3311"
          ENCRYPTION_SECRET: ci-smoke-test-secret
        run: bash scripts/smoke-test.sh
